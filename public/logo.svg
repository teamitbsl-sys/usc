<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 36">
  <!-- Sun starburst: 8-pointed star, inner r=7, outer r=13, centre (21,2) -->
  <polygon fill="#F0DA74"
    points="21,-11 23.7,-4.5 30.2,-7.2 27.5,-0.7 34,2 27.5,4.7 30.2,11.2 23.7,8.5 21,15 18.3,8.5 11.8,11.2 14.5,4.7 8,2 14.5,-0.7 11.8,-7.2 18.3,-4.5"/>
  <!-- Peak 1: larger, left/background — navy stroke creates the gap from sun -->
  <polygon points="0,36 15,9 15,36" fill="#FFFFFF" stroke="#0F1B30" stroke-width="1.5" stroke-linejoin="miter"/>
  <polygon points="15,9 31,36 15,36" fill="#D4AF37" stroke="#0F1B30" stroke-width="1.5" stroke-linejoin="miter"/>
  <!-- Peak 2: smaller, right/foreground -->
  <polygon points="19,36 30,16 30,36" fill="#FFFFFF" stroke="#0F1B30" stroke-width="1.5" stroke-linejoin="miter"/>
  <polygon points="30,16 44,36 30,36" fill="#D4AF37" stroke="#0F1B30" stroke-width="1.5" stroke-linejoin="miter"/>
</svg>
