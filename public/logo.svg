<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 36">
  <!-- Large sun disc — mountains will cover the bottom portion -->
  <circle cx="21" cy="10" r="12" fill="#F0DA74"/>
  <!-- Short ray lines radiating from disc edge (lower ones hidden behind mountains) -->
  <line x1="21" y1="-2"  x2="21" y2="-6"   stroke="#F0DA74" stroke-width="2" stroke-linecap="round"/>
  <line x1="29.5" y1="1.5"  x2="32.3" y2="-1.3" stroke="#F0DA74" stroke-width="2" stroke-linecap="round"/>
  <line x1="33"   y1="10"   x2="37"   y2="10"   stroke="#F0DA74" stroke-width="2" stroke-linecap="round"/>
  <line x1="29.5" y1="18.5" x2="32.3" y2="21.3" stroke="#F0DA74" stroke-width="2" stroke-linecap="round"/>
  <line x1="21"   y1="22"   x2="21"   y2="26"   stroke="#F0DA74" stroke-width="2" stroke-linecap="round"/>
  <line x1="12.5" y1="18.5" x2="9.7"  y2="21.3" stroke="#F0DA74" stroke-width="2" stroke-linecap="round"/>
  <line x1="9"    y1="10"   x2="5"    y2="10"   stroke="#F0DA74" stroke-width="2" stroke-linecap="round"/>
  <line x1="12.5" y1="1.5"  x2="9.7"  y2="-1.3" stroke="#F0DA74" stroke-width="2" stroke-linecap="round"/>
  <!-- Peak 1: larger, left — navy stroke creates gap from sun -->
  <polygon points="0,36 15,8 15,36"  fill="#FFFFFF" stroke="#0F1B30" stroke-width="1.5" stroke-linejoin="miter"/>
  <polygon points="15,8 30,36 15,36" fill="#D4AF37" stroke="#0F1B30" stroke-width="1.5" stroke-linejoin="miter"/>
  <!-- Peak 2: smaller, right/foreground -->
  <polygon points="18,36 29,15 29,36" fill="#FFFFFF" stroke="#0F1B30" stroke-width="1.5" stroke-linejoin="miter"/>
  <polygon points="29,15 44,36 29,36" fill="#D4AF37" stroke="#0F1B30" stroke-width="1.5" stroke-linejoin="miter"/>
</svg>
